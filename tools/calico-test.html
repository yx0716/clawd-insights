<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Calico Eye + Head Tracking Test</title>
<style>
  body { margin: 0; background: #2a2a2a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  object { width: 400px; height: 270px; }
</style>
</head>
<body>
<object id="cat" type="image/svg+xml" data="calico-final.svg"></object>
<script>
const cat = document.getElementById('cat');
cat.addEventListener('load', function() {
  const svgDoc = cat.contentDocument;

  const EYE_CX = 725, EYE_CY = 495;

  // Eye tracking: eyes move the most
  const EYE_MAX = 40;
  const EYE_EASE = 0.2;

  // Head tracking: head follows with less range
  const HEAD_MAX = 22;
  const HEAD_EASE = 0.12;

  // Shadow tracking: chest-head shifts slightly
  const SHADOW_MAX = 6;
  const SHADOW_EASE = 0.07;

  function wrapElements(ids, className) {
    ids.forEach(function(id) {
      const el = svgDoc.getElementById(id);
      if (!el) return;
      const wrapper = svgDoc.createElementNS('http://www.w3.org/2000/svg', 'g');
      wrapper.classList.add(className);
      el.parentNode.insertBefore(wrapper, el);
      wrapper.appendChild(el);
    });
  }

  // Wrap eye groups
  wrapElements(['eye-sockets', 'eye-pupils', 'eye-highlights'], 'eye-track');

  // Wrap head groups (face elements that follow the head)
  wrapElements([
    'outline-head', 'base-head',
    'patch-head-right', 'patch-head-left',
    'cheek-right', 'cheek-left',
    'mouth',
    'whiskers-right',
    'ears-inner',
    'ear-inner-right', 'ear-inner-left'
  ], 'head-track');

  // Also wrap ear-anim groups (outline + patches + base) by class
  svgDoc.querySelectorAll('.ear-anim').forEach(function(el) {
    const wrapper = svgDoc.createElementNS('http://www.w3.org/2000/svg', 'g');
    wrapper.classList.add('head-track');
    el.parentNode.insertBefore(wrapper, el);
    wrapper.appendChild(el);
  });

  // Wrap shadow (chest-head follows with even less movement)
  wrapElements(['chest-head'], 'shadow-track');

  const eyeWrappers = svgDoc.querySelectorAll('.eye-track');
  const headWrappers = svgDoc.querySelectorAll('.head-track');
  const shadowWrappers = svgDoc.querySelectorAll('.shadow-track');

  let targetX = 0, targetY = 0;
  let eyeX = 0, eyeY = 0;
  let headX = 0, headY = 0;
  let shadowX = 0, shadowY = 0;

  function calcOffset(dx, dy, maxOffset) {
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist === 0) return [0, 0];
    const clamp = Math.min(dist, maxOffset * 40) / (maxOffset * 40) * maxOffset;
    return [(dx / dist) * clamp, (dy / dist) * clamp];
  }

  document.addEventListener('mousemove', function(e) {
    const rect = cat.getBoundingClientRect();
    const scaleX = 1536 / rect.width;
    const scaleY = 1024 / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    targetX = mx - EYE_CX;
    targetY = my - EYE_CY;
  });

  document.addEventListener('mouseleave', function() {
    targetX = 0;
    targetY = 0;
  });

  function applyTransform(wrappers, x, y) {
    const tx = Math.round(x * 4) / 4;
    const ty = Math.round(y * 4) / 4;
    wrappers.forEach(function(w) {
      w.setAttribute('transform', 'translate(' + tx + ',' + ty + ')');
    });
  }

  function tick() {
    const [etx, ety] = calcOffset(targetX, targetY, EYE_MAX);
    const [htx, hty] = calcOffset(targetX, targetY, HEAD_MAX);
    const [stx, sty] = calcOffset(targetX, targetY, SHADOW_MAX);

    eyeX += (etx - eyeX) * EYE_EASE;
    eyeY += (ety - eyeY) * EYE_EASE;
    headX += (htx - headX) * HEAD_EASE;
    headY += (hty - headY) * HEAD_EASE;
    shadowX += (stx - shadowX) * SHADOW_EASE;
    shadowY += (sty - shadowY) * SHADOW_EASE;

    applyTransform(eyeWrappers, eyeX, eyeY);
    applyTransform(headWrappers, headX, headY);
    applyTransform(shadowWrappers, shadowX, shadowY);

    requestAnimationFrame(tick);
  }

  tick();
  console.log('Tracking active — eyes:', eyeWrappers.length,
              'head:', headWrappers.length, 'shadow:', shadowWrappers.length);
});
</script>
</body>
</html>
