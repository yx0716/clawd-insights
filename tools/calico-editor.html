<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>三花猫坐垫 SVG 编辑器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; height: 100vh; background: #1a1a2e; color: #eee; font-family: system-ui, sans-serif; overflow: hidden; }

  #canvas-area {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: repeating-conic-gradient(#2a2a3e 0% 25%, #222238 0% 50%) 0 0 / 20px 20px;
  }
  #canvas-area svg {
    width: 700px; height: 525px; cursor: default;
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
  }

  #sidebar {
    width: 340px; background: #16213e; padding: 16px; overflow-y: auto;
    border-left: 1px solid #333; flex-shrink: 0;
  }
  h2 { font-size: 13px; color: #888; margin: 16px 0 6px; text-transform: uppercase; letter-spacing: 1px; }
  h2:first-child { margin-top: 0; }

  .el-item {
    padding: 6px 10px; margin: 1px 0; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; gap: 8px; font-size: 13px;
    transition: background 0.15s;
  }
  .el-item:hover { background: #1a2744; }
  .el-item.active { background: #0f3460; outline: 1px solid #4a9eff; }
  .el-item .swatch {
    width: 12px; height: 12px; border-radius: 3px; border: 1px solid #555; flex-shrink: 0;
  }

  .coords {
    background: #0d1b2a; padding: 8px; border-radius: 6px; margin: 6px 0;
    font-family: Consolas, monospace; font-size: 11px; color: #7ec8e3;
    min-height: 36px; line-height: 1.5;
  }

  button {
    padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer;
    font-size: 12px; margin: 2px 1px; transition: all 0.15s;
  }
  .btn-primary { background: #4a9eff; color: #fff; }
  .btn-primary:hover { background: #3a8eef; }
  .btn-sm { background: #333; color: #ddd; padding: 4px 8px; font-size: 11px; }
  .btn-sm:hover { background: #444; }
  .btn-secondary { background: #333; color: #ddd; }
  .btn-secondary:hover { background: #444; }

  .toggle-row {
    display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 12px;
  }
  .toggle-row input[type="checkbox"] { accent-color: #4a9eff; }

  .ctrl-row {
    display: flex; align-items: center; gap: 6px; margin: 5px 0; font-size: 12px;
  }
  .ctrl-row label { width: 36px; flex-shrink: 0; color: #aaa; }
  .ctrl-row input[type="range"] { flex: 1; accent-color: #4a9eff; }
  .ctrl-row input[type="number"] {
    width: 55px; background: #0d1b2a; border: 1px solid #333; color: #7ec8e3;
    border-radius: 4px; padding: 3px 5px; font-family: Consolas, monospace; font-size: 11px;
    text-align: center;
  }
  .ctrl-row .unit { color: #666; font-size: 11px; width: 14px; }

  .btn-row { display: flex; flex-wrap: wrap; gap: 3px; margin: 4px 0; }

  .layer-idx {
    font-size: 10px; color: #555; margin-left: auto; font-family: Consolas, monospace; min-width: 16px; text-align: right;
  }

  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #4a9eff; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 99;
  }
  #toast.show { opacity: 1; }

  .hint { font-size: 10px; color: #555; margin: 2px 0; }
  [data-draggable] { cursor: grab; }
  [data-draggable]:active { cursor: grabbing; }
  .drag-highlight { outline: 2px dashed #4a9eff; outline-offset: 3px; }
  #transform-controls { opacity: 0.4; pointer-events: none; }
  #transform-controls.enabled { opacity: 1; pointer-events: auto; }

  /* Free transform handles */
  #ft-handles { pointer-events: none; }
  .ft-handle {
    fill: #4a9eff; stroke: #fff; stroke-width: 1; cursor: pointer;
    pointer-events: auto;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
  }
  .ft-handle:hover { fill: #6db8ff; }
  .ft-handle-rotate { fill: #ff6b4a; cursor: crosshair; }
  .ft-handle-rotate:hover { fill: #ff8b6a; }
  .ft-bbox { fill: none; stroke: #4a9eff; stroke-width: 0.8; stroke-dasharray: 4 3; }
  .ft-line { stroke: #ff6b4a; stroke-width: 0.8; stroke-dasharray: 3 2; }

  /* Path point editing handles */
  #pt-handles { pointer-events: none; }
  .pt-anchor {
    fill: #4caf50; stroke: #fff; stroke-width: 1.2; r: 4; cursor: move;
    pointer-events: auto; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
  }
  .pt-anchor:hover { fill: #66cc6a; r: 5; }
  .pt-control {
    fill: #ff9800; stroke: #fff; stroke-width: 1; r: 3.5; cursor: move;
    pointer-events: auto;
  }
  .pt-control:hover { fill: #ffb84d; }
  .pt-ctrl-line { stroke: #ff9800; stroke-width: 0.6; stroke-dasharray: 2 2; pointer-events: none; }
</style>
</head>
<body>

<div id="canvas-area">
  <svg id="svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
    <defs>
      <filter id="fuzzy">
        <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
      </filter>
      <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#222" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="#222" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="iris" cx="48%" cy="44%" r="50%">
        <stop offset="0%" stop-color="#EDD060"/>
        <stop offset="50%" stop-color="#C5A030"/>
        <stop offset="100%" stop-color="#886018"/>
      </radialGradient>
    </defs>

    <ellipse id="el-shadow" cx="200" cy="245" rx="100" ry="25" fill="url(#shadowGrad)" data-draggable data-name="阴影" data-color="#666"/>

    <g id="fuzzy-group" filter="url(#fuzzy)">
      <g id="el-tail" data-draggable data-name="尾巴" data-color="#F5F0E1">
        <path d="M280,155 Q305,135 320,150 Q320,170 295,162" fill="#F5F0E1"/>
        <path d="M300,142 Q312,135 320,148 Q315,155 303,150" fill="#5C4033"/>
      </g>
      <path id="el-body" d="M100,180 Q100,110 200,110 Q300,110 300,180 Q300,250 200,250 Q100,250 100,180" fill="#F5F0E1" data-draggable data-name="身体" data-color="#F5F0E1"/>
      <path id="el-patch-orange-left" d="M110,150 Q105,180 130,220 L100,220 Q85,180 110,150" fill="#D48B47" data-draggable data-name="橘色块-左" data-color="#D48B47"/>
      <path id="el-tuft-brown-left" d="M160,115 Q180,105 200,120 Q180,135 160,115" fill="#5C4033" data-draggable data-name="棕色头顶-左" data-color="#5C4033"/>
      <path id="el-tuft-orange-right" d="M210,110 Q230,105 250,120 Q230,135 210,110" fill="#D48B47" data-draggable data-name="橘色头顶-右" data-color="#D48B47"/>
      <path id="el-patch-orange-right" d="M270,185 Q310,170 315,210 Q290,235 270,185" fill="#D48B47" data-draggable data-name="橘色块-右" data-color="#D48B47"/>
      <circle id="el-spot-brown" cx="280" cy="170" r="25" fill="#5C4033" data-draggable data-name="棕斑-右" data-color="#5C4033"/>
      <path id="el-ear-left" d="M135,140 L155,160 Q145,175 125,160 Z" fill="#F5F0E1" stroke="#D48B47" stroke-width="3" data-draggable data-name="左耳" data-color="#F5F0E1"/>
      <path id="el-ear-right" d="M225,145 L245,165 Q235,180 215,165 Z" fill="#F5F0E1" stroke="#D48B47" stroke-width="3" data-draggable data-name="右耳" data-color="#F5F0E1"/>
      <path id="el-face-patch" d="M170,175 Q160,245 230,240 Q260,210 240,170 Q210,150 170,175" fill="#5C4033" data-draggable data-name="棕色脸部" data-color="#5C4033"/>
      <path id="el-nose" d="M182,215 Q185,220 188,215" fill="none" stroke="#D48B47" stroke-width="2" stroke-linecap="round" data-draggable data-name="鼻子" data-color="#D48B47"/>
    </g>

    <g id="el-eye-left" data-draggable data-name="左眼" data-color="#C5A030">
      <circle cx="160" cy="205" r="18" fill="#FFF8F0"/>
      <circle cx="160" cy="205" r="14" fill="url(#iris)"/>
      <circle cx="160" cy="205" r="9" fill="#222"/>
      <circle cx="164" cy="199" r="4" fill="#FFF"/>
      <circle cx="155" cy="210" r="1.5" fill="#FFF" opacity="0.5"/>
    </g>
    <g id="el-eye-right" data-draggable data-name="右眼" data-color="#C5A030">
      <circle cx="215" cy="215" r="18" fill="#FFF8F0"/>
      <circle cx="215" cy="215" r="14" fill="url(#iris)"/>
      <circle cx="215" cy="215" r="9" fill="#222"/>
      <circle cx="219" cy="209" r="4" fill="#FFF"/>
      <circle cx="210" cy="220" r="1.5" fill="#FFF" opacity="0.5"/>
    </g>
  </svg>
</div>

<div id="sidebar">
  <h2>显示</h2>
  <div class="toggle-row">
    <input type="checkbox" id="toggle-filter" checked>
    <label for="toggle-filter">毛绒滤镜</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="toggle-grid">
    <label for="toggle-grid">网格</label>
  </div>

  <h2>图层</h2>
  <div id="el-list"></div>

  <h2>选中元素</h2>
  <div class="coords" id="coords-display">点击图层或拖拽元素选中</div>

  <div id="transform-controls">
    <h2>位置</h2>
    <div class="ctrl-row">
      <label>X</label>
      <input type="range" id="ctrl-tx" min="-200" max="200" value="0" step="1">
      <input type="number" id="ctrl-tx-val" value="0" step="1">
      <span class="unit">px</span>
    </div>
    <div class="ctrl-row">
      <label>Y</label>
      <input type="range" id="ctrl-ty" min="-200" max="200" value="0" step="1">
      <input type="number" id="ctrl-ty-val" value="0" step="1">
      <span class="unit">px</span>
    </div>

    <h2>旋转</h2>
    <div class="ctrl-row">
      <label>角度</label>
      <input type="range" id="ctrl-rot" min="-180" max="180" value="0" step="1">
      <input type="number" id="ctrl-rot-val" value="0" step="1">
      <span class="unit">°</span>
    </div>
    <div class="btn-row">
      <button class="btn-sm" onclick="adjRot(-90)">-90°</button>
      <button class="btn-sm" onclick="adjRot(-45)">-45°</button>
      <button class="btn-sm" onclick="adjRot(-15)">-15°</button>
      <button class="btn-sm" onclick="adjRot(15)">+15°</button>
      <button class="btn-sm" onclick="adjRot(45)">+45°</button>
      <button class="btn-sm" onclick="adjRot(90)">+90°</button>
    </div>

    <h2>缩放</h2>
    <div class="ctrl-row">
      <label>大小</label>
      <input type="range" id="ctrl-scale" min="10" max="300" value="100" step="1">
      <input type="number" id="ctrl-scale-val" value="100" step="5">
      <span class="unit">%</span>
    </div>
    <div class="toggle-row" style="margin-left:42px">
      <input type="checkbox" id="ctrl-scale-lock" checked>
      <label for="ctrl-scale-lock">锁定比例</label>
    </div>
    <div id="scale-separate" style="display:none">
      <div class="ctrl-row">
        <label>宽</label>
        <input type="range" id="ctrl-sx" min="10" max="300" value="100" step="1">
        <input type="number" id="ctrl-sx-val" value="100" step="5">
        <span class="unit">%</span>
      </div>
      <div class="ctrl-row">
        <label>高</label>
        <input type="range" id="ctrl-sy" min="10" max="300" value="100" step="1">
        <input type="number" id="ctrl-sy-val" value="100" step="5">
        <span class="unit">%</span>
      </div>
    </div>

    <h2>翻转</h2>
    <div class="btn-row">
      <button class="btn-secondary" onclick="flipH()">↔ 水平翻转</button>
      <button class="btn-secondary" onclick="flipV()">↕ 垂直翻转</button>
    </div>

    <h2>层级</h2>
    <div class="btn-row">
      <button class="btn-sm" onclick="layerMove('top')" title="移到最前">⤒ 最前</button>
      <button class="btn-sm" onclick="layerMove('up')" title="上移一层">↑ 上移</button>
      <button class="btn-sm" onclick="layerMove('down')" title="下移一层">↓ 下移</button>
      <button class="btn-sm" onclick="layerMove('bottom')" title="移到最后">⤓ 最后</button>
    </div>
    <p class="hint">快捷键: ] 上移 / [ 下移 | Shift: 移到顶/底</p>
  </div>

  <h2>操作</h2>
  <div class="btn-row">
    <button class="btn-secondary" onclick="duplicateSelected()">📋 复制元素</button>
    <button class="btn-secondary" onclick="resetSelected()">重置选中</button>
    <button class="btn-secondary" onclick="resetAll()">重置全部</button>
    <button class="btn-secondary" onclick="undoLast()">撤销</button>
  </div>
  <div class="toggle-row" style="margin-top:6px">
    <input type="checkbox" id="toggle-freetransform" checked>
    <label for="toggle-freetransform">变换手柄（旋转/缩放）</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="toggle-pointedit" checked>
    <label for="toggle-pointedit">顶点编辑（捏形状）</label>
  </div>
  <div class="btn-row" style="margin-top:4px">
    <button class="btn-primary" onclick="exportSVG()">导出 SVG</button>
    <button class="btn-primary" onclick="copySVG()">复制到剪贴板</button>
  </div>
  <p class="hint" style="margin-top:6px">方向键移动 | Shift加速 | R/E旋转 | +/-缩放 | D复制 | Ctrl+Z撤销</p>

  <h2>导出</h2>
  <textarea id="export-area" style="width:100%;height:120px;background:#0d1b2a;color:#7ec8e3;border:1px solid #333;border-radius:6px;padding:6px;font-family:Consolas,monospace;font-size:10px;resize:vertical;" readonly placeholder="点击导出生成"></textarea>
</div>

<div id="toast"></div>

<script>
const svg = document.getElementById('svg');
const elList = document.getElementById('el-list');
const coordsDisplay = document.getElementById('coords-display');
const exportArea = document.getElementById('export-area');
const tControls = document.getElementById('transform-controls');

// Transform state per element: {tx, ty, rotate, scaleX, scaleY, cx, cy}
const draggables = Array.from(document.querySelectorAll('[data-draggable]'));
const transforms = new Map();
const history = [];

// Init: compute original center for each element
draggables.forEach(el => {
  const bbox = el.getBBox();
  transforms.set(el, {
    tx: 0, ty: 0, rotate: 0, scaleX: 1, scaleY: 1,
    cx: bbox.x + bbox.width / 2,
    cy: bbox.y + bbox.height / 2
  });
});

// Selection
let selectedEl = null;

// Build / rebuild element list (reflects current DOM order)
function rebuildList() {
  elList.innerHTML = '';
  // Gather all draggables in current DOM order (querySelectorAll returns document order)
  const ordered = Array.from(document.querySelectorAll('[data-draggable]'));
  ordered.forEach((el, i) => {
    const item = document.createElement('div');
    item.className = 'el-item' + (el === selectedEl ? ' active' : '');
    item.innerHTML = `<div class="swatch" style="background:${el.dataset.color}"></div>${el.dataset.name}<span class="layer-idx">${i}</span>`;
    item.addEventListener('click', () => selectElement(el));
    el._listItem = item;
    elList.appendChild(item);
  });
}
rebuildList();

function selectElement(el) {
  if (selectedEl) {
    selectedEl.classList.remove('drag-highlight');
    selectedEl._listItem?.classList.remove('active');
  }
  selectedEl = el;
  if (el) {
    el.classList.add('drag-highlight');
    el._listItem?.classList.add('active');
    tControls.classList.add('enabled');
    syncControlsFromState(el);
  } else {
    tControls.classList.remove('enabled');
  }
}

function syncControlsFromState(el) {
  const t = transforms.get(el);
  setCtrl('tx', t.tx);
  setCtrl('ty', t.ty);
  setCtrl('rot', t.rotate);
  setCtrl('scale', Math.round(t.scaleX * 100));
  setCtrl('sx', Math.round(t.scaleX * 100));
  setCtrl('sy', Math.round(t.scaleY * 100));
  updateCoordsDisplay(el);
}

function setCtrl(name, val) {
  const range = document.getElementById('ctrl-' + name);
  const num = document.getElementById('ctrl-' + name + '-val');
  if (range) range.value = val;
  if (num) num.value = Math.round(val * 10) / 10;
}

function updateCoordsDisplay(el) {
  if (!el) return;
  const t = transforms.get(el);
  const flipH = t.scaleX < 0, flipV = t.scaleY < 0;
  let info = `<b>${el.dataset.name}</b>\n`;
  info += `位置: (${t.tx.toFixed(1)}, ${t.ty.toFixed(1)})`;
  if (t.rotate !== 0) info += ` | 旋转: ${t.rotate.toFixed(1)}°`;
  const sx = Math.abs(t.scaleX), sy = Math.abs(t.scaleY);
  if (sx !== 1 || sy !== 1) info += ` | 缩放: ${(sx*100).toFixed(0)}%×${(sy*100).toFixed(0)}%`;
  if (flipH || flipV) info += ` | 翻转: ${flipH?'H':''}${flipV?'V':''}`;
  coordsDisplay.innerHTML = info;
}

// Apply composed transform: translate → rotate → scale (around element center)
function applyTransform(el) {
  const t = transforms.get(el);
  // transform around original center: translate to center, rotate+scale, translate back, then offset
  el.setAttribute('transform',
    `translate(${t.tx.toFixed(1)}, ${t.ty.toFixed(1)}) ` +
    `translate(${t.cx.toFixed(1)}, ${t.cy.toFixed(1)}) ` +
    `rotate(${t.rotate.toFixed(1)}) ` +
    `scale(${t.scaleX.toFixed(4)}, ${t.scaleY.toFixed(4)}) ` +
    `translate(${(-t.cx).toFixed(1)}, ${(-t.cy).toFixed(1)})`
  );
}

function saveUndo(el, type) {
  if (type === 'reorder') {
    history.push({ type: 'reorder', el, parent: el.parentNode, next: el.nextElementSibling });
  } else {
    const t = transforms.get(el);
    history.push({ type: 'transform', el, tx:t.tx, ty:t.ty, rotate:t.rotate, scaleX:t.scaleX, scaleY:t.scaleY });
  }
  if (history.length > 80) history.shift();
}

// --- Drag ---
let dragEl = null, dragStartSVG = null, dragStartT = null, ftDrag = null, ptDrag = null;
function screenToSVG(cx, cy) {
  const pt = svg.createSVGPoint();
  pt.x = cx; pt.y = cy;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

svg.addEventListener('pointerdown', (e) => {
  const target = e.target.closest('[data-draggable]');
  if (!target) return;
  // Set up drag state FIRST — selectElement may throw (updateFreeTransform)
  dragEl = target;
  dragStartSVG = screenToSVG(e.clientX, e.clientY);
  const t = transforms.get(target);
  dragStartT = { tx: t.tx, ty: t.ty };
  saveUndo(target);
  svg.setPointerCapture(e.pointerId);
  e.preventDefault();
  selectElement(target);
});
svg.addEventListener('pointermove', (e) => {
  if (!dragEl || ftDrag || ptDrag) return;
  const now = screenToSVG(e.clientX, e.clientY);
  const t = transforms.get(dragEl);
  t.tx = dragStartT.tx + (now.x - dragStartSVG.x);
  t.ty = dragStartT.ty + (now.y - dragStartSVG.y);
  applyTransform(dragEl);
  syncControlsFromState(dragEl);
});
svg.addEventListener('pointerup', () => {
  if (ftDrag) { ftDrag = null; updateFreeTransform(); }
  if (ptDrag) { ptDrag = null; updatePointHandles(); }
  dragEl = null;
});

// --- Slider / input bindings ---
function bindCtrl(name, getter, setter) {
  const range = document.getElementById('ctrl-' + name);
  const num = document.getElementById('ctrl-' + name + '-val');
  function onInput(val) {
    if (!selectedEl) return;
    saveUndo(selectedEl);
    setter(transforms.get(selectedEl), parseFloat(val));
    applyTransform(selectedEl);
    syncControlsFromState(selectedEl);
  }
  range?.addEventListener('input', (e) => { num.value = e.target.value; onInput(e.target.value); });
  num?.addEventListener('input', (e) => { if (range) range.value = e.target.value; onInput(e.target.value); });
}

bindCtrl('tx', t => t.tx, (t, v) => { t.tx = v; });
bindCtrl('ty', t => t.ty, (t, v) => { t.ty = v; });
bindCtrl('rot', t => t.rotate, (t, v) => { t.rotate = v; });

bindCtrl('scale', t => Math.round(Math.abs(t.scaleX)*100), (t, v) => {
  const s = v / 100;
  t.scaleX = s * Math.sign(t.scaleX || 1);
  t.scaleY = s * Math.sign(t.scaleY || 1);
});
bindCtrl('sx', t => Math.round(Math.abs(t.scaleX)*100), (t, v) => {
  t.scaleX = (v / 100) * Math.sign(t.scaleX || 1);
});
bindCtrl('sy', t => Math.round(Math.abs(t.scaleY)*100), (t, v) => {
  t.scaleY = (v / 100) * Math.sign(t.scaleY || 1);
});

// Lock toggle
document.getElementById('ctrl-scale-lock').addEventListener('change', (e) => {
  document.getElementById('scale-separate').style.display = e.target.checked ? 'none' : 'block';
  document.getElementById('ctrl-scale').parentElement.style.display = e.target.checked ? 'flex' : 'none';
});

// --- Button actions ---
function adjRot(deg) {
  if (!selectedEl) return;
  saveUndo(selectedEl);
  const t = transforms.get(selectedEl);
  t.rotate = ((t.rotate + deg + 180) % 360) - 180;
  applyTransform(selectedEl);
  syncControlsFromState(selectedEl);
}
function flipH() {
  if (!selectedEl) return;
  saveUndo(selectedEl);
  const t = transforms.get(selectedEl);
  t.scaleX *= -1;
  applyTransform(selectedEl);
  syncControlsFromState(selectedEl);
  toast('水平翻转');
}
function flipV() {
  if (!selectedEl) return;
  saveUndo(selectedEl);
  const t = transforms.get(selectedEl);
  t.scaleY *= -1;
  applyTransform(selectedEl);
  syncControlsFromState(selectedEl);
  toast('垂直翻转');
}
function resetSelected() {
  if (!selectedEl) return;
  saveUndo(selectedEl);
  const t = transforms.get(selectedEl);
  t.tx = 0; t.ty = 0; t.rotate = 0; t.scaleX = 1; t.scaleY = 1;
  applyTransform(selectedEl);
  syncControlsFromState(selectedEl);
  toast('已重置');
}
function resetAll() {
  draggables.forEach(el => {
    const t = transforms.get(el);
    t.tx = 0; t.ty = 0; t.rotate = 0; t.scaleX = 1; t.scaleY = 1;
    el.removeAttribute('transform');
  });
  if (selectedEl) syncControlsFromState(selectedEl);
  toast('已重置全部');
}
function undoLast() {
  const entry = history.pop();
  if (!entry) return toast('无可撤销');
  if (entry.type === 'reorder') {
    entry.parent.insertBefore(entry.el, entry.next);
    rebuildList();
  } else {
    const t = transforms.get(entry.el);
    t.tx = entry.tx; t.ty = entry.ty;
    t.rotate = entry.rotate; t.scaleX = entry.scaleX; t.scaleY = entry.scaleY;
    applyTransform(entry.el);
  }
  selectElement(entry.el);
  toast('已撤销');
}

// --- Duplicate ---
let dupeCounter = 0;
function duplicateSelected() {
  if (!selectedEl) return toast('请先选中元素');
  const el = selectedEl;
  const clone = el.cloneNode(true);
  dupeCounter++;
  const baseName = el.dataset.name;
  clone.dataset.name = baseName + ' 副本' + (dupeCounter > 1 ? dupeCounter : '');
  clone.id = (el.id || 'el-clone') + '-copy' + dupeCounter;
  // Remove old _listItem ref
  delete clone._listItem;
  // Insert after original
  el.parentNode.insertBefore(clone, el.nextSibling);
  // Copy transform state with offset so it's visible
  const srcT = transforms.get(el);
  const newT = { tx: srcT.tx + 15, ty: srcT.ty + 15, rotate: srcT.rotate,
    scaleX: srcT.scaleX, scaleY: srcT.scaleY, cx: srcT.cx, cy: srcT.cy };
  transforms.set(clone, newT);
  draggables.push(clone);
  applyTransform(clone);
  rebuildList();
  selectElement(clone);
  toast('已复制: ' + clone.dataset.name);
}

// --- Layer reorder ---
function layerMove(dir) {
  if (!selectedEl) return;
  const parent = selectedEl.parentNode;
  // Get sibling draggables within same parent
  const siblings = Array.from(parent.children).filter(c => c.hasAttribute('data-draggable') || c.querySelector('[data-draggable]') === c);
  saveUndo(selectedEl, 'reorder');

  switch (dir) {
    case 'up': {
      const next = selectedEl.nextElementSibling;
      if (next) parent.insertBefore(next, selectedEl);
      else return toast('已在最前');
      break;
    }
    case 'down': {
      const prev = selectedEl.previousElementSibling;
      if (prev) parent.insertBefore(selectedEl, prev);
      else return toast('已在最后');
      break;
    }
    case 'top':
      parent.appendChild(selectedEl);
      break;
    case 'bottom':
      parent.insertBefore(selectedEl, parent.firstElementChild);
      break;
  }
  rebuildList();
  toast(dir === 'up' ? '上移一层' : dir === 'down' ? '下移一层' : dir === 'top' ? '移到最前' : '移到最后');
}

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (!selectedEl) return;
  const t = transforms.get(selectedEl);
  const step = e.shiftKey ? 5 : 1;
  let handled = true;

  switch (e.key) {
    case 'ArrowLeft':  saveUndo(selectedEl); t.tx -= step; break;
    case 'ArrowRight': saveUndo(selectedEl); t.tx += step; break;
    case 'ArrowUp':    saveUndo(selectedEl); t.ty -= step; break;
    case 'ArrowDown':  saveUndo(selectedEl); t.ty += step; break;
    case 'r': saveUndo(selectedEl); t.rotate += (e.shiftKey ? 15 : 5); break;
    case 'e': saveUndo(selectedEl); t.rotate -= (e.shiftKey ? 15 : 5); break;
    case 'R': saveUndo(selectedEl); t.rotate += 15; break;
    case 'E': saveUndo(selectedEl); t.rotate -= 15; break;
    case '=': case '+': saveUndo(selectedEl); t.scaleX *= 1.05; t.scaleY *= 1.05; break;
    case '-': saveUndo(selectedEl); t.scaleX *= 0.95; t.scaleY *= 0.95; break;
    case 'h': saveUndo(selectedEl); t.scaleX *= -1; break;
    case 'v': saveUndo(selectedEl); t.scaleY *= -1; break;
    case 'd': duplicateSelected(); break;
    case ']': layerMove(e.shiftKey ? 'top' : 'up'); break;
    case '[': layerMove(e.shiftKey ? 'bottom' : 'down'); break;
    case 'z': if (e.ctrlKey || e.metaKey) { undoLast(); } else { handled = false; } break;
    default: handled = false;
  }
  if (handled) {
    e.preventDefault();
    applyTransform(selectedEl);
    syncControlsFromState(selectedEl);
  }
});

// --- Toggles ---
document.getElementById('toggle-filter').addEventListener('change', (e) => {

document.getElementById('toggle-grid').addEventListener('change', (e) => {

      }

// --- Export ---
function exportSVG() {
  const lines = [];
  draggables.forEach(el => {
    const t = transforms.get(el);
    const changed = Math.abs(t.tx)>0.5 || Math.abs(t.ty)>0.5 || Math.abs(t.rotate)>0.5 || Math.abs(t.scaleX-1)>0.01 || Math.abs(t.scaleY-1)>0.01;
    if (changed) {
      let desc = `${el.dataset.name}: translate(${t.tx.toFixed(1)}, ${t.ty.toFixed(1)})`;
      if (Math.abs(t.rotate)>0.5) desc += ` rotate(${t.rotate.toFixed(1)}°)`;
      if (Math.abs(t.scaleX-1)>0.01 || Math.abs(t.scaleY-1)>0.01)
        desc += ` scale(${(t.scaleX*100).toFixed(0)}%, ${(t.scaleY*100).toFixed(0)}%)`;
      lines.push(desc);
    }
  });
  let out = lines.length ? lines.map(l => `/* ${l} */`).join('\n') + '\n\n' : '';
  // Remove grid before export
  const grid = document.getElementById('grid-lines');
  if (grid) grid.remove();
  out += svg.outerHTML;
  exportArea.value = out;
  toast('已导出');
}

async function copySVG() {
  exportSVG();
  try { await navigator.clipboard.writeText(exportArea.value); toast('已复制'); }
  catch { exportArea.select(); document.execCommand('copy'); toast('已复制'); }
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ========================
// Free Transform Handles
// ========================
const ftGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
ftGroup.id = 'ft-handles';
svg.appendChild(ftGroup);

let ftEnabled = true;
document.getElementById('toggle-freetransform').addEventListener('change', (e) => {
  ftEnabled = e.target.checked;
  updateFreeTransform();
});

function updateFreeTransform() {
  ftGroup.innerHTML = '';
  if (!selectedEl || !ftEnabled) return;
  try {

  const t = transforms.get(selectedEl);
  const bbox = selectedEl.getBBox();
  // Corners in element's local space
  const corners = [
    { x: bbox.x, y: bbox.y },                           // TL
    { x: bbox.x + bbox.width, y: bbox.y },               // TR
    { x: bbox.x + bbox.width, y: bbox.y + bbox.height }, // BR
    { x: bbox.x, y: bbox.y + bbox.height },               // BL
  ];

  // Apply current transform to get screen-space corners
  const cx = t.cx, cy = t.cy;
  const rad = t.rotate * Math.PI / 180;
  const cosR = Math.cos(rad), sinR = Math.sin(rad);

  function transformPt(p) {
    // Local → center-relative → scale → rotate → translate
    let x = p.x - cx, y = p.y - cy;
    x *= t.scaleX; y *= t.scaleY;
    const rx = x * cosR - y * sinR;
    const ry = x * sinR + y * cosR;
    return { x: rx + cx + t.tx, y: ry + cy + t.ty };
  }

  const tp = corners.map(transformPt);
  const center = transformPt({ x: cx, y: cy });

  // Bounding box outline
  const bboxPath = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  bboxPath.setAttribute('points', tp.map(p => `${p.x},${p.y}`).join(' '));
  bboxPath.setAttribute('class', 'ft-bbox');
  ftGroup.appendChild(bboxPath);

  // Rotation handle: above top-center, with connecting line
  const topMid = { x: (tp[0].x + tp[1].x) / 2, y: (tp[0].y + tp[1].y) / 2 };
  // Offset perpendicular to top edge, pointing "outward"
  const edgeDx = tp[1].x - tp[0].x, edgeDy = tp[1].y - tp[0].y;
  const edgeLen = Math.sqrt(edgeDx * edgeDx + edgeDy * edgeDy) || 1;
  const nx = -edgeDy / edgeLen, ny = edgeDx / edgeLen;
  const rotDist = 25;
  const rotPt = { x: topMid.x + nx * rotDist, y: topMid.y + ny * rotDist };

  const rotLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  rotLine.setAttribute('x1', topMid.x); rotLine.setAttribute('y1', topMid.y);
  rotLine.setAttribute('x2', rotPt.x); rotLine.setAttribute('y2', rotPt.y);
  rotLine.setAttribute('class', 'ft-line');
  ftGroup.appendChild(rotLine);

  const rotHandle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  rotHandle.setAttribute('cx', rotPt.x); rotHandle.setAttribute('cy', rotPt.y);
  rotHandle.setAttribute('r', 5);
  rotHandle.setAttribute('class', 'ft-handle ft-handle-rotate');
  rotHandle.dataset.ftRole = 'rotate';
  ftGroup.appendChild(rotHandle);

  // Scale handles at corners
  const roles = ['scale-tl', 'scale-tr', 'scale-br', 'scale-bl'];
  tp.forEach((p, i) => {
    const h = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    h.setAttribute('x', p.x - 4); h.setAttribute('y', p.y - 4);
    h.setAttribute('width', 8); h.setAttribute('height', 8);
    h.setAttribute('rx', 1.5);
    h.setAttribute('class', 'ft-handle');
    h.dataset.ftRole = roles[i];
    h.dataset.cornerIdx = i;
    ftGroup.appendChild(h);
  });

  } catch(err) { console.warn('updateFreeTransform:', err); }
}

// Free transform drag logic
svg.addEventListener('pointerdown', (e) => {
  // Only handle clicks on ft-handle elements (delegated)
  const handle = e.target.closest('.ft-handle');
  if (!handle || !selectedEl) return;
  const role = handle.dataset?.ftRole;
  if (!role) return;
  e.stopImmediatePropagation();
  e.preventDefault();
  svg.setPointerCapture(e.pointerId);

  saveUndo(selectedEl);
  const t = transforms.get(selectedEl);
  const startSVG = screenToSVG(e.clientX, e.clientY);

  // Center in SVG space (after transform)
  const rad = t.rotate * Math.PI / 180;
  const cosR = Math.cos(rad), sinR = Math.sin(rad);
  const cx = t.cx + t.tx, cy = t.cy + t.ty;

  if (role === 'rotate') {
    const startAngle = Math.atan2(startSVG.y - cy, startSVG.x - cx);
    ftDrag = { role, startAngle, startRotate: t.rotate, cx, cy };
  } else {
    // Scale from opposite corner
    const idx = parseInt(handle.dataset.cornerIdx);
    const oppIdx = (idx + 2) % 4;
    // Get opposite corner's current position
    const bbox = selectedEl.getBBox();
    const corners = [
      { x: bbox.x, y: bbox.y }, { x: bbox.x + bbox.width, y: bbox.y },
      { x: bbox.x + bbox.width, y: bbox.y + bbox.height }, { x: bbox.x, y: bbox.y + bbox.height },
    ];
    function transformPt(p) {
      let x = p.x - t.cx, y = p.y - t.cy;
      x *= t.scaleX; y *= t.scaleY;
      return { x: x * cosR - y * sinR + t.cx + t.tx, y: x * sinR + y * cosR + t.cy + t.ty };
    }
    const anchor = transformPt(corners[oppIdx]);
    const startDist = Math.sqrt((startSVG.x - anchor.x) ** 2 + (startSVG.y - anchor.y) ** 2) || 1;
    ftDrag = { role: 'scale', anchor, startDist, startScaleX: t.scaleX, startScaleY: t.scaleY };
  }
});

svg.addEventListener('pointermove', (e) => {
  if (!ftDrag || !selectedEl) return;
  const now = screenToSVG(e.clientX, e.clientY);
  const t = transforms.get(selectedEl);

  if (ftDrag.role === 'rotate') {
    const angle = Math.atan2(now.y - ftDrag.cy, now.x - ftDrag.cx);
    let delta = (angle - ftDrag.startAngle) * 180 / Math.PI;
    // Snap to 15° increments with Shift
    let newRot = ftDrag.startRotate + delta;
    if (e.shiftKey) newRot = Math.round(newRot / 15) * 15;
    t.rotate = ((newRot + 180) % 360) - 180;
  } else if (ftDrag.role === 'scale') {
    const dist = Math.sqrt((now.x - ftDrag.anchor.x) ** 2 + (now.y - ftDrag.anchor.y) ** 2) || 1;
    const ratio = dist / ftDrag.startDist;
    // Uniform scaling (lock aspect), preserving flip signs
    const signX = Math.sign(ftDrag.startScaleX) || 1;
    const signY = Math.sign(ftDrag.startScaleY) || 1;
    t.scaleX = ftDrag.startScaleX * ratio;
    t.scaleY = ftDrag.startScaleY * ratio;
    // Snap to 25% increments with Shift
    if (e.shiftKey) {
      const snapX = Math.round(Math.abs(t.scaleX) * 4) / 4;
      const snapY = Math.round(Math.abs(t.scaleY) * 4) / 4;
      t.scaleX = Math.max(0.1, snapX) * signX;
      t.scaleY = Math.max(0.1, snapY) * signY;
    }
  }

  applyTransform(selectedEl);
  syncControlsFromState(selectedEl);
  updateFreeTransform();
});

// ========================
// Path Point Editing
// ========================
const ptGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
ptGroup.id = 'pt-handles';
svg.appendChild(ptGroup);

let ptEnabled = true;
document.getElementById('toggle-pointedit').addEventListener('change', (e) => {
  ptEnabled = e.target.checked;
  updatePointHandles();
});

// --- Path parser & serializer ---
function parsePath(d) {
  const cmds = [];
  const re = /([MLQCSTZ])([\s\S]*?)(?=[MLQCSTZ]|$)/gi;
  let m;
  while ((m = re.exec(d)) !== null) {
    const cmd = m[1].toUpperCase();
    if (cmd === 'Z') { cmds.push({ cmd: 'Z', pts: [] }); continue; }
    const nums = m[2].trim().split(/[\s,]+/).filter(Boolean).map(Number);
    const pts = [];
    for (let i = 0; i < nums.length - 1; i += 2) pts.push({ x: nums[i], y: nums[i + 1] });
    cmds.push({ cmd, pts });
  }
  return cmds;
}

function serializePath(cmds) {
  return cmds.map(c => {
    if (c.cmd === 'Z') return 'Z';
    return c.cmd + c.pts.map(p => `${Math.round(p.x * 10) / 10},${Math.round(p.y * 10) / 10}`).join(' ');
  }).join(' ');
}

// --- Coordinate transforms (local ↔ SVG space) ---
function localToSVG(p, t) {
  let x = p.x - t.cx, y = p.y - t.cy;
  x *= t.scaleX; y *= t.scaleY;
  const rad = t.rotate * Math.PI / 180;
  const cosR = Math.cos(rad), sinR = Math.sin(rad);
  return { x: x * cosR - y * sinR + t.cx + t.tx, y: x * sinR + y * cosR + t.cy + t.ty };
}

function svgToLocal(p, t) {
  let x = p.x - t.tx - t.cx, y = p.y - t.ty - t.cy;
  const rad = -t.rotate * Math.PI / 180;
  const cosR = Math.cos(rad), sinR = Math.sin(rad);
  const rx = x * cosR - y * sinR;
  const ry = x * sinR + y * cosR;
  return { x: rx / t.scaleX + t.cx, y: ry / t.scaleY + t.cy };
}

// --- Build point handles ---
function updatePointHandles() {
  ptGroup.innerHTML = '';
  if (!selectedEl || !ptEnabled) return;
  try {
    const t = transforms.get(selectedEl);
    collectPathEls(selectedEl).forEach(info => addPointsForPath(info.el, info.t));
    collectCircleEls(selectedEl).forEach(info => addPointsForCircle(info.el, info.t));
  } catch(err) { console.warn('updatePointHandles:', err); }
}

function collectPathEls(el) {
  const t = transforms.get(el);
  if (el.tagName === 'path') return [{ el, t }];
  if (el.tagName === 'g') {
    const results = [];
    el.querySelectorAll('path').forEach(p => results.push({ el: p, t }));
    return results;
  }
  return [];
}

function collectCircleEls(el) {
  const t = transforms.get(el);
  if (el.tagName === 'circle' || el.tagName === 'ellipse') return [{ el, t }];
  if (el.tagName === 'g') {
    const results = [];
    el.querySelectorAll('circle, ellipse').forEach(c => results.push({ el: c, t }));
    return results;
  }
  return [];
}

function addPointsForPath(pathEl, t) {
  const d = pathEl.getAttribute('d');
  if (!d) return;
  const cmds = parsePath(d);

  cmds.forEach((c, ci) => {
    if (c.cmd === 'Z') return;
    c.pts.forEach((pt, pi) => {
      const svgPt = localToSVG(pt, t);
      // Q command: first point is control, last is anchor
      // C command: first two are controls, last is anchor
      const isControl = (c.cmd === 'Q' && pi === 0) || (c.cmd === 'C' && pi < 2);

      // Draw control line from control point to its anchor
      if (isControl) {
        const anchorIdx = c.pts.length - 1;
        const anchorSvg = localToSVG(c.pts[anchorIdx], t);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', svgPt.x); line.setAttribute('y1', svgPt.y);
        line.setAttribute('x2', anchorSvg.x); line.setAttribute('y2', anchorSvg.y);
        line.setAttribute('class', 'pt-ctrl-line');
        ptGroup.appendChild(line);
      }

      const handle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      handle.setAttribute('cx', svgPt.x);
      handle.setAttribute('cy', svgPt.y);
      handle.setAttribute('r', isControl ? 3.5 : 4);
      handle.setAttribute('class', isControl ? 'pt-control' : 'pt-anchor');
      handle.dataset.pathRole = 'path-pt';
      handle.dataset.cmdIdx = ci;
      handle.dataset.ptIdx = pi;
      handle._pathEl = pathEl;
      handle._transform = t;
      ptGroup.appendChild(handle);
    });
  });
}

function addPointsForCircle(circleEl, t) {
  const tag = circleEl.tagName;
  const cx = parseFloat(circleEl.getAttribute('cx') || 0);
  const cy = parseFloat(circleEl.getAttribute('cy') || 0);

  // Center handle
  const centerSvg = localToSVG({ x: cx, y: cy }, t);
  const ch = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  ch.setAttribute('cx', centerSvg.x); ch.setAttribute('cy', centerSvg.y);
  ch.setAttribute('r', 4);
  ch.setAttribute('class', 'pt-anchor');
  ch.dataset.pathRole = 'circle-center';
  ch._circleEl = circleEl;
  ch._transform = t;
  ptGroup.appendChild(ch);

  // Radius handle(s)
  if (tag === 'circle') {
    const r = parseFloat(circleEl.getAttribute('r') || 0);
    const rSvg = localToSVG({ x: cx + r, y: cy }, t);
    const rLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    rLine.setAttribute('x1', centerSvg.x); rLine.setAttribute('y1', centerSvg.y);
    rLine.setAttribute('x2', rSvg.x); rLine.setAttribute('y2', rSvg.y);
    rLine.setAttribute('class', 'pt-ctrl-line');
    ptGroup.appendChild(rLine);
    const rh = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    rh.setAttribute('cx', rSvg.x); rh.setAttribute('cy', rSvg.y);
    rh.setAttribute('r', 3.5);
    rh.setAttribute('class', 'pt-control');
    rh.dataset.pathRole = 'circle-r';
    rh._circleEl = circleEl;
    rh._transform = t;
    ptGroup.appendChild(rh);
  } else { // ellipse
    const rx = parseFloat(circleEl.getAttribute('rx') || 0);
    const ry = parseFloat(circleEl.getAttribute('ry') || 0);
    [{ attr: 'rx', dx: rx, dy: 0 }, { attr: 'ry', dx: 0, dy: ry }].forEach(({ attr, dx, dy }) => {
      const eSvg = localToSVG({ x: cx + dx, y: cy + dy }, t);
      const eLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      eLine.setAttribute('x1', centerSvg.x); eLine.setAttribute('y1', centerSvg.y);
      eLine.setAttribute('x2', eSvg.x); eLine.setAttribute('y2', eSvg.y);
      eLine.setAttribute('class', 'pt-ctrl-line');
      ptGroup.appendChild(eLine);
      const eh = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      eh.setAttribute('cx', eSvg.x); eh.setAttribute('cy', eSvg.y);
      eh.setAttribute('r', 3.5);
      eh.setAttribute('class', 'pt-control');
      eh.dataset.pathRole = 'ellipse-' + attr;
      eh._circleEl = circleEl;
      eh._transform = t;
      ptGroup.appendChild(eh);
    });
  }
}

// --- Point drag logic ---
svg.addEventListener('pointerdown', (e) => {
  const handle = e.target;
  const role = handle.dataset?.pathRole;
  if (!role || !selectedEl) return;
  e.stopImmediatePropagation();
  e.preventDefault();
  svg.setPointerCapture(e.pointerId);

  if (role === 'path-pt') {
    const pathEl = handle._pathEl;
    const t = handle._transform;
    const ci = parseInt(handle.dataset.cmdIdx);
    const pi = parseInt(handle.dataset.ptIdx);
    // Save undo: store the entire d attribute
    history.push({ type: 'pathdata', el: pathEl, d: pathEl.getAttribute('d') });
    if (history.length > 80) history.shift();
    ptDrag = { role: 'path-pt', pathEl, t, cmdIdx: ci, ptIdx: pi };
  } else if (role === 'circle-center' || role === 'circle-r' || role.startsWith('ellipse-')) {
    const circleEl = handle._circleEl;
    const t = handle._transform;
    // Save undo
    const attrs = {};
    ['cx', 'cy', 'r', 'rx', 'ry'].forEach(a => {
      const v = circleEl.getAttribute(a);
      if (v !== null) attrs[a] = v;
    });
    history.push({ type: 'circledata', el: circleEl, attrs });
    if (history.length > 80) history.shift();
    ptDrag = { role, circleEl, t };
  }
});

svg.addEventListener('pointermove', (e) => {
  if (!ptDrag) return;
  const svgPt = screenToSVG(e.clientX, e.clientY);

  if (ptDrag.role === 'path-pt') {
    const localPt = svgToLocal(svgPt, ptDrag.t);
    const d = ptDrag.pathEl.getAttribute('d');
    const cmds = parsePath(d);
    if (cmds[ptDrag.cmdIdx] && cmds[ptDrag.cmdIdx].pts[ptDrag.ptIdx]) {
      cmds[ptDrag.cmdIdx].pts[ptDrag.ptIdx] = localPt;
      ptDrag.pathEl.setAttribute('d', serializePath(cmds));
    }
  } else if (ptDrag.role === 'circle-center') {
    const localPt = svgToLocal(svgPt, ptDrag.t);
    ptDrag.circleEl.setAttribute('cx', Math.round(localPt.x * 10) / 10);
    ptDrag.circleEl.setAttribute('cy', Math.round(localPt.y * 10) / 10);
  } else if (ptDrag.role === 'circle-r') {
    const localPt = svgToLocal(svgPt, ptDrag.t);
    const cx = parseFloat(ptDrag.circleEl.getAttribute('cx'));
    const cy = parseFloat(ptDrag.circleEl.getAttribute('cy'));
    const r = Math.max(1, Math.sqrt((localPt.x - cx) ** 2 + (localPt.y - cy) ** 2));
    ptDrag.circleEl.setAttribute('r', Math.round(r * 10) / 10);
  } else if (ptDrag.role === 'ellipse-rx') {
    const localPt = svgToLocal(svgPt, ptDrag.t);
    const cx = parseFloat(ptDrag.circleEl.getAttribute('cx'));
    ptDrag.circleEl.setAttribute('rx', Math.round(Math.max(1, Math.abs(localPt.x - cx)) * 10) / 10);
  } else if (ptDrag.role === 'ellipse-ry') {
    const localPt = svgToLocal(svgPt, ptDrag.t);
    const cy = parseFloat(ptDrag.circleEl.getAttribute('cy'));
    ptDrag.circleEl.setAttribute('ry', Math.round(Math.max(1, Math.abs(localPt.y - cy)) * 10) / 10);
  }
  updatePointHandles();
});

// --- Patch into existing systems ---
const _origSelect = selectElement;
selectElement = function(el) {
  _origSelect(el);
  updateFreeTransform();
  updatePointHandles();
};

const _origApply = applyTransform;
applyTransform = function(el) {
  _origApply(el);
  if (el === selectedEl && !ftDrag && !ptDrag) {
    if (ftEnabled) updateFreeTransform();
    if (ptEnabled) updatePointHandles();
  }
};

// Extend undo to handle path/circle data
const _origUndo = undoLast;
undoLast = function() {
  const entry = history[history.length - 1];
  if (entry && entry.type === 'pathdata') {
    history.pop();
    entry.el.setAttribute('d', entry.d);
    updatePointHandles();
    toast('已撤销顶点');
    return;
  }
  if (entry && entry.type === 'circledata') {
    history.pop();
    Object.entries(entry.attrs).forEach(([k, v]) => entry.el.setAttribute(k, v));
    updatePointHandles();
    toast('已撤销顶点');
    return;
  }
  _origUndo();
};

// Export: hide both handle groups
const _origExport = exportSVG;
exportSVG = function() {
  ftGroup.style.display = 'none';
  ptGroup.style.display = 'none';
  _origExport();
  ftGroup.style.display = '';
  ptGroup.style.display = '';
};

</script>
</body>
